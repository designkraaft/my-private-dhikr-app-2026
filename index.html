<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" id="themeColorMeta" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3669/3669483.png">
    
    <title>مسبحتي</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --card-radius: 24px;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e0eaf5 0%, #f0f4f8 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 1);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.4);
            --text: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; outline: none; transition: background-color 0.3s, color 0.3s; }
        body { margin: 0; padding: 0; background: var(--bg-gradient); color: var(--text); height: 100dvh; overflow: hidden; user-select: none; }
        
        #app { display: flex; width: 100%; height: 100%; position: relative; }
        
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; transform: scale(0.95); }
        .screen.active { opacity: 1; pointer-events: all; transform: scale(1); z-index: 10; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: var(--card-radius); }

        .header { padding: 20px; padding-top: env(safe-area-inset-top, 20px); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; background: -webkit-linear-gradient(45deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        
        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(8px); color: var(--primary); display: flex; justify-content: center; align-items: center; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; transition: 0.2s; box-shadow: var(--glass-shadow); }
        .icon-btn:active { transform: scale(0.9); background: var(--primary); color: white; }
        
        .daily-progress-card { margin: 0 20px 15px 20px; padding: 25px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .daily-progress-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); opacity: 0.4; pointer-events: none; }
        .daily-title { font-size: 15px; font-weight: bold; margin: 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .daily-date { font-size: 13px; margin: 8px 0 15px 0; color: var(--primary); }
        .daily-count { font-size: 48px; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 4px 20px var(--primary-glow); }
        
        .list-container { flex: 1; overflow-y: auto; padding: 5px 20px; padding-bottom: calc(100px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 15px; }
        
        .card { padding: 18px 20px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; display: flex; flex-direction: column; gap: 12px; position: relative; border-radius: 20px; }
        .card:active { transform: scale(0.97); }
        
        .card-main-row { display: flex; align-items: center; width: 100%; gap: 15px; }
        .drag-handle { color: var(--text-muted); opacity: 0.5; cursor: grab; display: flex; align-items: center; justify-content: center; padding: 10px 0; margin-right: -5px; }
        .drag-handle:active { cursor: grabbing; opacity: 1; color: var(--primary); }
        
        .card-content-area { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .card-title { font-size: 17px; font-weight: bold; margin: 0; line-height: 1.4; }
        .card-reset-info { font-size: 12px; color: var(--text-muted); margin: 0; }
        .card-count { font-size: 18px; color: var(--primary); font-weight: 900; }
        
        .edit-action-btn { background: transparent; border: none; color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .edit-action-btn:active { background: rgba(255,255,255,0.1); color: var(--primary); }
        
        .progress-bar-bg { width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; margin-top: 5px;}
        [data-theme="dark"] .progress-bar-bg { background: rgba(255,255,255,0.05); }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #a855f7); border-radius: 10px; transition: width 0.3s ease; box-shadow: 0 0 10px var(--primary-glow); }

        .fab { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 20px; width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #a855f7); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px var(--primary-glow); z-index: 50; cursor: pointer; transition: 0.2s; border: none; }
        .fab:active { transform: scale(0.9); }

        .app-version { text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 10px; opacity: 0.5; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; padding-top: env(safe-area-inset-top, 20px); }
        .counter-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .dhikr-text-display { font-size: 24px; text-align: center; margin-bottom: 40px; font-weight: bold; line-height: 1.6; color: var(--text); padding: 0 10px; }
        
        .circle-wrapper { position: relative; width: 320px; height: 320px; display: flex; justify-content: center; align-items: center; }
        
        .progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); drop-shadow: 0 0 10px var(--primary-glow); }
        .progress-ring__circle_bg { stroke: var(--glass-border); fill: transparent; stroke-width: 6; opacity: 0.3; }
        .progress-ring__circle { stroke: url(#gradient); fill: transparent; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.1s ease-out; filter: drop-shadow(0 0 8px var(--primary-glow)); }
        
        .tap-area { position: absolute; width: 260px; height: 260px; border-radius: 50%; z-index: 10; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: transform 0.05s, box-shadow 0.2s; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.3); }
        .tap-area:active { transform: scale(0.92); box-shadow: inset 0 0 30px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.2); }
        [data-theme="light"] .tap-area:active { box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 10px 20px rgba(0,0,0,0.1); }
        
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 var(--primary-glow); } 100% { box-shadow: 0 0 0 30px transparent; } }
        .tap-area.pulse { animation: pulse-ring 0.3s ease-out; }

        .count-huge { font-size: 65px; font-weight: 900; margin: 0; color: var(--text); font-variant-numeric: tabular-nums; }
        .target-small { font-size: 16px; color: var(--text-muted); margin-top: 5px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; }
        
        .active-reset-date { font-size: 14px; color: var(--text-muted); margin-top: 40px; text-align: center; background: var(--glass-bg); padding: 10px 25px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }

        .bottom-controls { width: 100%; display: flex; justify-content: center; padding: 20px; padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
        
        .reset-big-btn { display: flex; align-items: center; gap: 10px; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 15px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px); }
        .reset-big-btn:active { transform: scale(0.95); background: var(--danger); color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px; }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-content { width: 100%; max-width: 360px; transform: translateY(30px) scale(0.95); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 35px 25px; display: flex; flex-direction: column; position: relative; }
        .modal.active .modal-content { transform: translateY(0) scale(1); }
        
        .close-x-btn { position: absolute; top: 15px; left: 15px; background: transparent; border: none; color: var(--text-muted); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 50%; transition: 0.2s; }
        .close-x-btn:active { background: rgba(255,255,255,0.1); color: var(--text); }

        .modal h3 { margin-top: 0; margin-bottom: 25px; text-align: center; font-size: 22px; font-weight: 800; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 10px; color: var(--text-muted); font-size: 14px; font-weight: bold;}
        .input-group input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text); padding: 16px; border-radius: 16px; font-size: 16px; transition: 0.3s; text-align: right; }
        [data-theme="light"] .input-group input { background: rgba(255,255,255,0.6); }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 25px; }
        .btn { flex: 1; padding: 16px; border-radius: 16px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; box-shadow: var(--glass-shadow); display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-primary { background: linear-gradient(135deg, var(--primary), #a855f7); }
        .btn-success { background: var(--success); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: none; }
        .btn-danger:active { background: var(--danger); color: white; }
        .btn:active { transform: scale(0.95); }
        
        .sortable-ghost { opacity: 0.3; background: var(--primary-glow); border: 2px dashed var(--primary); border-radius: var(--card-radius); }
        .sortable-fallback { opacity: 1 !important; box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important; cursor: grabbing !important; z-index: 9999 !important; transform: scale(1.02); }

        /* الزر الجديد الثابت للتحديث في الأعلى */
        #updateBanner { display: none; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 12px 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); z-index: 9999; cursor: pointer; font-weight: bold; text-align: center; width: 90%; max-width: 350px; border: 2px solid rgba(255,255,255,0.2); animation: pulseUpdate 2s infinite; }
        @keyframes pulseUpdate {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- زر التحديث الثابت (يظهر فقط عند وجود تحديث وينبض بوضوح) -->
    <div id="updateBanner" onclick="applyUpdate()">✨ يتوفر تحديث جديد! اضغط هنا لتثبيته ✨</div>

    <!-- الشاشة الأولى: القائمة -->
    <div id="list-screen" class="screen active">
        <div class="header">
            <h1>مسبحتي</h1>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggleBtn" title="تبديل الوضع" onclick="toggleTheme()">
                    <svg id="themeIcon" viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none"></svg>
                </button>
                <button class="icon-btn" id="installBtn" title="تثبيت التطبيق" style="display: none;">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
        
        <div class="glass-panel daily-progress-card">
            <p class="daily-title">إنجازك اليوم 🏆</p>
            <p class="daily-date" id="dailyDateTxt"></p>
            <p class="daily-count" id="dailyTotalTxt">0</p>
        </div>

        <div class="list-container" id="dhikrList">
            <!-- البطاقات تظهر هنا -->
        </div>
        
        <div class="app-version">الإصدار 1.5.0</div>

        <!-- الزر العائم للإضافة -->
        <button class="fab" onclick="openAddModal()" title="إضافة ذكر">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        </button>
    </div>

    <!-- الشاشة الثانية: العداد -->
    <div id="counter-screen" class="screen">
        <div class="top-bar">
            <!-- زر الرجوع فقط في الأعلى -->
            <button class="icon-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div></div> <!-- عنصر فارغ للحفاظ على التوازن -->
        </div>
        
        <div class="counter-container">
            <div class="dhikr-text-display" id="activeDhikrText">سبحان الله</div>
            
            <div class="circle-wrapper">
                <svg class="progress-ring" width="320" height="320">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="var(--primary)" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring__circle_bg" cx="160" cy="160" r="145"></circle>
                    <circle id="progressRing" class="progress-ring__circle" cx="160" cy="160" r="145"></circle>
                </svg>
                
                <div class="tap-area" id="mainTapArea" onclick="increment()">
                    <p class="count-huge" id="activeCount">0</p>
                    <p class="target-small" id="activeTarget">الهدف: 100</p>
                </div>
            </div>
            
            <p class="active-reset-date" id="activeResetDate"></p>
        </div>

        <div class="bottom-controls">
            <button class="reset-big-btn" onclick="resetCurrent()" title="تصفير">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3v5h5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                إعادة تصفير العداد
            </button>
        </div>
    </div>
</div>

<!-- نافذة الإضافة/التعديل -->
<div class="modal" id="modal">
    <div class="glass-panel modal-content">
        <button class="close-x-btn" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle">إضافة ذكر جديد</h3>
        
        <div class="input-group">
            <label>نص الذكر</label>
            <input type="text" id="dhikrNameInput" placeholder="اكتب هنا...">
        </div>
        <div class="input-group">
            <label>الهدف (اتركه فارغاً للعد المفتوح)</label>
            <input type="number" id="dhikrTargetInput" placeholder="مثال: 100">
        </div>
        
        <div class="modal-actions">
            <!-- زر الحذف يظهر فقط عند التعديل -->
            <button class="btn btn-danger" id="deleteBtn" onclick="deleteDhikr()" style="display: none;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                حذف
            </button>
            <button class="btn btn-primary" onclick="saveDhikr()" style="flex: 2;">حفظ</button>
        </div>
    </div>
</div>

<!-- نافذة الإنجاز -->
<div class="modal" id="goalModal">
    <div class="glass-panel modal-content" style="text-align: center; border: 1px solid var(--success);">
        <button class="close-x-btn" onclick="closeGoalModal()">&times;</button>
        <div style="width: 70px; height: 70px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="var(--success)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h3 style="color: var(--success); font-size: 26px; margin-bottom: 10px;">تقبل الله طاعتكم 🌿</h3>
        <p style="color: var(--text); font-size: 16px; margin-bottom: 25px; line-height: 1.6;">الحمد لله الذي بنعمته تتم الصالحات،<br>لقد أتممت وردك بفضل الله.</p>
        <button class="btn btn-success" onclick="resetFromGoal()" style="width: 100%;">🔄 بدء جولة جديدة</button>
    </div>
</div>

<script>
    const htmlEl = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    const themeMeta = document.getElementById('themeColorMeta');
    
    let currentTheme = localStorage.getItem('app_theme') || 'dark';
    applyTheme(currentTheme);

    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(currentTheme);
    }

    function applyTheme(theme) {
        htmlEl.setAttribute('data-theme', theme);
        localStorage.setItem('app_theme', theme);
        if(theme === 'light') {
            themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
            themeMeta.setAttribute('content', '#e0eaf5');
        } else {
            themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/>`;
            themeMeta.setAttribute('content', '#0f172a');
        }
    }

    function updateDailyCounter() {
        const todayStr = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        let savedDate = localStorage.getItem('daily_date');
        let dailyTotal = parseInt(localStorage.getItem('daily_total')) || 0;

        if (savedDate !== todayStr) {
            dailyTotal = 0;
            localStorage.setItem('daily_date', todayStr);
            localStorage.setItem('daily_total', dailyTotal);
        }

        document.getElementById('dailyDateTxt').textContent = todayStr;
        document.getElementById('dailyTotalTxt').textContent = dailyTotal.toLocaleString('en-US');
    }

    function addDailyTotal() {
        let dailyTotal = parseInt(localStorage.getItem('daily_total')) || 0;
        dailyTotal++;
        localStorage.setItem('daily_total', dailyTotal);
        updateDailyCounter();
    }

    function getCurrentDateTime() {
        return new Date().toLocaleString('ar-EG', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    const defaultDhikrs = [
        { id: 1, text: "سبحان الله وبحمده، سبحان الله العظيم", count: 0, target: 100, lastReset: getCurrentDateTime() },
        { id: 2, text: "أستغفر الله العظيم الذي لا إله إلا هو الحي القيوم وأتوب إليه", count: 0, target: 100, lastReset: getCurrentDateTime() },
        { id: 3, text: "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير", count: 0, target: 100, lastReset: getCurrentDateTime() },
        { id: 4, text: "سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر", count: 0, target: 100, lastReset: getCurrentDateTime() }
    ];

    let dhikrs = JSON.parse(localStorage.getItem('my_dhikr_pro_v5')) || defaultDhikrs;
    let activeId = null;
    let editingId = null;

    const circle = document.getElementById('progressRing');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    function setProgress(percent) {
        if(percent > 100) percent = 100;
        const offset = circumference - (percent / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }

    function saveData() {
        localStorage.setItem('my_dhikr_pro_v5', JSON.stringify(dhikrs));
    }

    function renderList() {
        updateDailyCounter();
        const listContainer = document.getElementById('dhikrList');
        listContainer.innerHTML = '';
        
        if (dhikrs.length === 0) {
            listContainer.innerHTML = `
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 20px; padding: 20px; margin-top: 40px; opacity: 0.7;">
                    <svg viewBox="0 0 24 24" width="80" height="80" stroke="var(--text-muted)" stroke-width="1.5" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <p style="color: var(--text-muted); font-size: 16px;">قائمتك فارغة، اضغط على زر الإضافة بالأسفل لتبدأ.</p>
                </div>
            `;
            return; 
        }

        dhikrs.forEach(d => {
            const hasTarget = d.target > 0;
            const percent = hasTarget ? Math.min((d.count / d.target) * 100, 100) : 0;
            const targetText = hasTarget ? ` / ${d.target}` : '';
            const resetText = d.lastReset ? `آخر تصفير: ${d.lastReset}` : 'لم يتم البدء';
            
            const card = document.createElement('div');
            card.className = 'glass-panel card';
            card.dataset.id = d.id; 
            
            card.innerHTML = `
                <div class="card-main-row">
                    <div class="drag-handle" title="اسحب للترتيب">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="4" y1="8" x2="20" y2="8"></line><line x1="4" y1="16" x2="20" y2="16"></line></svg>
                    </div>
                    
                    <div class="card-content-area" onclick="openCounter(${d.id})">
                        <p class="card-title">${d.text}</p>
                        <p class="card-reset-info">🕒 ${resetText}</p>
                    </div>

                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                        <button class="edit-action-btn" onclick="openEditModal(${d.id}); event.stopPropagation();" title="تعديل">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <p class="card-count" onclick="openCounter(${d.id})">${d.count}${targetText}</p>
                    </div>
                </div>
                ${hasTarget ? `
                <div class="progress-bar-bg" onclick="openCounter(${d.id})">
                    <div class="progress-bar-fill" style="width: ${percent}%"></div>
                </div>` : ''}
            `;
            listContainer.appendChild(card);
        });

        new Sortable(listContainer, {
            animation: 150,
            handle: '.drag-handle',
            delay: 150,             
            delayOnTouchOnly: true, 
            ghostClass: 'sortable-ghost',
            forceFallback: true,        
            fallbackClass: "sortable-fallback",
            fallbackOnBody: true,       
            onEnd: function (evt) {
                const newIndex = evt.newIndex;
                const oldIndex = evt.oldIndex;
                const movedItem = dhikrs.splice(oldIndex, 1)[0];
                dhikrs.splice(newIndex, 0, movedItem);
                saveData();
            },
        });
    }

    function openCounter(id) {
        activeId = id;
        updateCounterUI();
        document.getElementById('list-screen').classList.remove('active');
        document.getElementById('counter-screen').classList.add('active');
    }

    function goBack() {
        renderList(); 
        document.getElementById('counter-screen').classList.remove('active');
        document.getElementById('list-screen').classList.add('active');
        activeId = null;
    }

    function updateCounterUI() {
        if(!activeId) return;
        const current = dhikrs.find(d => d.id === activeId);
        
        document.getElementById('activeDhikrText').textContent = current.text;
        document.getElementById('activeCount').textContent = current.count;
        
        const resetDateEl = document.getElementById('activeResetDate');
        resetDateEl.textContent = current.lastReset ? `بدأت في: ${current.lastReset}` : "";
        
        const targetEl = document.getElementById('activeTarget');
        if (current.target > 0) {
            targetEl.textContent = `الهدف: ${current.target}`;
            targetEl.style.display = 'inline-block';
            setProgress((current.count / current.target) * 100);
        } else {
            targetEl.style.display = 'none';
            setProgress(100); 
        }
    }

    function triggerRipple() {
        const area = document.getElementById('mainTapArea');
        area.classList.remove('pulse');
        void area.offsetWidth; 
        area.classList.add('pulse');
    }

    function increment() {
        const current = dhikrs.find(d => d.id === activeId);
        
        if (current.target > 0 && current.count >= current.target) {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            document.getElementById('goalModal').classList.add('active');
            return; 
        }

        current.count++;
        addDailyTotal(); 
        triggerRipple(); 
        
        if (navigator.vibrate) navigator.vibrate(40);
        saveData();
        updateCounterUI();

        if (current.target > 0 && current.count === current.target) {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setTimeout(() => {
                document.getElementById('goalModal').classList.add('active');
            }, 300);
        }
    }

    function closeGoalModal() {
        document.getElementById('goalModal').classList.remove('active');
    }

    function resetFromGoal() {
        closeGoalModal();
        resetCurrent(true); 
    }

    function resetCurrent(force = false) {
        if(force || confirm("هل أنت متأكد من تصفير العداد وبدء جولة جديدة؟\n(ملاحظة: الإنجاز اليومي لن يتأثر)")) {
            const current = dhikrs.find(d => d.id === activeId);
            current.count = 0;
            current.lastReset = getCurrentDateTime();
            saveData();
            updateCounterUI();
        }
    }

    function openAddModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = "إضافة ذكر جديد";
        document.getElementById('dhikrNameInput').value = "";
        document.getElementById('dhikrTargetInput').value = "";
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('modal').classList.add('active');
    }

    function openEditModal(id) {
        const current = dhikrs.find(d => d.id === id);
        if(!current) return;
        editingId = id;
        document.getElementById('modalTitle').textContent = "تعديل الذكر";
        document.getElementById('dhikrNameInput').value = current.text;
        document.getElementById('dhikrTargetInput').value = current.target || '';
        document.getElementById('deleteBtn').style.display = 'flex'; 
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    function saveDhikr() {
        const text = document.getElementById('dhikrNameInput').value.trim();
        const targetStr = document.getElementById('dhikrTargetInput').value;
        const target = targetStr ? parseInt(targetStr) : 0; 
        
        if (!text) return alert("يرجى كتابة نص الذكر");

        if (editingId) {
            const current = dhikrs.find(d => d.id === editingId);
            current.text = text;
            current.target = target;
        } else {
            const newId = dhikrs.length ? Math.max(...dhikrs.map(d => d.id)) + 1 : 1;
            dhikrs.push({ id: newId, text: text, count: 0, target: target, lastReset: getCurrentDateTime() });
        }
        
        saveData();
        renderList();
        closeModal();
    }

    function deleteDhikr() {
        if(confirm("هل أنت متأكد من حذف هذا الذكر نهائياً؟")) {
            dhikrs = dhikrs.filter(d => d.id !== editingId);
            saveData();
            renderList();
            closeModal();
        }
    }

    // --- نظام التحديث الذكي (الزر الثابت) ---
    let newWorker;
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
                newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // إظهار زر التحديث الثابت في الأعلى
                        document.getElementById('updateBanner').style.display = 'block';
                    }
                });
            });
        });

        let refreshing;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            window.location.reload();
            refreshing = true;
        });
    }

    function applyUpdate() {
        if (newWorker) {
            newWorker.postMessage('skipWaiting');
        }
    }

    // --- زر التثبيت الذكي ---
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt !== null) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });

    updateDailyCounter();
    renderList();
</script>
</body>
</html>
